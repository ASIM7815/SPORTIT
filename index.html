<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time IPL match prediction with custom ML models">
    <meta name="keywords" content="IPL, cricket, prediction, machine learning, sports analytics">
    <title>IPL Sports Prediction System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="cricket-ball">🏏</span>
                <h1>IPL Match Predictor</h1>
            </div>
            <p class="tagline">Real-time predictions powered by custom ML models</p>
        </header>

        <main class="main-content">
            <section class="input-section">
                <h2>📊 Match Details</h2>
                
                <div class="form-group">
                    <label for="battingTeam">Batting Team</label>
                    <select id="battingTeam" class="input-field">
                        <option value="">Select Team</option>
                        <option value="MI">Mumbai Indians</option>
                        <option value="CSK">Chennai Super Kings</option>
                        <option value="RCB">Royal Challengers Bangalore</option>
                        <option value="KKR">Kolkata Knight Riders</option>
                        <option value="DC">Delhi Capitals</option>
                        <option value="RR">Rajasthan Royals</option>
                        <option value="PBKS">Punjab Kings</option>
                        <option value="SRH">Sunrisers Hyderabad</option>
                        <option value="GT">Gujarat Titans</option>
                        <option value="LSG">Lucknow Super Giants</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bowlingTeam">Bowling Team</label>
                    <select id="bowlingTeam" class="input-field">
                        <option value="">Select Team</option>
                        <option value="MI">Mumbai Indians</option>
                        <option value="CSK">Chennai Super Kings</option>
                        <option value="RCB">Royal Challengers Bangalore</option>
                        <option value="KKR">Kolkata Knight Riders</option>
                        <option value="DC">Delhi Capitals</option>
                        <option value="RR">Rajasthan Royals</option>
                        <option value="PBKS">Punjab Kings</option>
                        <option value="SRH">Sunrisers Hyderabad</option>
                        <option value="GT">Gujarat Titans</option>
                        <option value="LSG">Lucknow Super Giants</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="currentRuns">Current Runs</label>
                        <input type="number" id="currentRuns" class="input-field" placeholder="e.g., 120" min="0">
                    </div>
                    <div class="form-group">
                        <label for="wickets">Wickets Lost</label>
                        <input type="number" id="wickets" class="input-field" placeholder="e.g., 3" min="0" max="10">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="overs">Overs Completed</label>
                        <input type="number" id="overs" class="input-field" placeholder="e.g., 12.3" min="0" max="20" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="target">Target (if chasing)</label>
                        <input type="number" id="target" class="input-field" placeholder="e.g., 180" min="0">
                    </div>
                </div>

                <button id="predictBtn" class="predict-btn">
                    <span>🎯</span>
                    <span>Predict Match Outcome</span>
                </button>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2>🎯 Prediction Results</h2>
                
                <div class="probability-cards">
                    <div class="prob-card win-card">
                        <div class="card-icon">🏆</div>
                        <div class="card-label">Win Probability</div>
                        <div class="card-value" id="winProb">0%</div>
                        <div class="progress-bar">
                            <div class="progress-fill win-fill" id="winProgress" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="prob-card lose-card">
                        <div class="card-icon">📉</div>
                        <div class="card-label">Loss Probability</div>
                        <div class="card-value" id="loseProb">0%</div>
                        <div class="progress-bar">
                            <div class="progress-fill lose-fill" id="loseProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Predicted Final Score</div>
                        <div class="stat-value" id="finalScore">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Current Run Rate</div>
                        <div class="stat-value" id="currentRR">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Required Run Rate</div>
                        <div class="stat-value" id="requiredRR">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Runs Needed</div>
                        <div class="stat-value" id="runsNeeded">-</div>
                    </div>
                </div>

                <div class="model-info">
                    <h3>📈 Model Performance</h3>
                    <div class="model-metrics">
                        <div class="metric">
                            <div class="metric-label">Best Model</div>
                            <div class="metric-value" id="bestModel">-</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">R² Score</div>
                            <div class="metric-value" id="r2Score">-</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">RMSE</div>
                            <div class="metric-value" id="rmse">-</div>
                        </div>
                    </div>
                </div>

                <button id="closeResults" class="predict-btn" style="margin-top: 20px;">
                    <span>✖️</span>
                    <span>Close Results</span>
                </button>
            </section>
        </main>
    </div>

    <div id="backdrop" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;"></div>

    <script src="regression_models.js"></script>
    <script src="app.js"></script>
</body>
</html>
